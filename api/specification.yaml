openapi: 3.0.3
info:
  title: Delivery Orchestration Service API
  version: 1.0.0
  description: >
    Промышленный фрагмент спецификации DOS. Демонстрирует ключевой метод
    расчёта стоимости и сроков доставки с учётом сплита заказа по продавцам
    и складам, мультиперевозчиков и graceful degradation.
  contact:
    name: Delivery Platform Team
    email: delivery-team@marketx.example
servers:
  - url: https://api.marketx.example/delivery
    description: Production
  - url: https://api.staging.marketx.example/delivery
    description: Staging

tags:
  - name: Calculation
    description: Расчёт доступных вариантов доставки

paths:
  /api/v1/delivery/calculate:
    post:
      tags: [Calculation]
      operationId: calculateDelivery
      summary: Рассчитать варианты доставки для корзины
      description: >
        Группирует позиции корзины по (продавец, склад), опрашивает применимых
        перевозчиков и возвращает агрегированные варианты доставки.
        Операция идемпотентна по содержимому (без побочных эффектов, кроме кэша).
      parameters:
        - name: X-Request-Id
          in: header
          required: false
          description: Сквозной идентификатор трассировки.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateRequest'
            examples:
              twoMerchants:
                summary: Корзина с товарами двух продавцов
                value:
                  destination:
                    city: "Казань"
                    postalCode: "420012"
                    address: "ул. Баумана, д. 1"
                  items:
                    - sku: "SKU-A-001"
                      merchantId: "8f1c2d3e-0000-4a00-9b00-aaaaaaaaaaaa"
                      warehouseId: "11111111-0000-4a00-9b00-111111111111"
                      quantity: 1
                      weightGrams: 1200
                      dimensionsMm: { length: 200, width: 150, height: 80 }
                    - sku: "SKU-B-007"
                      merchantId: "9e2d3f4a-0000-4a00-9b00-bbbbbbbbbbbb"
                      warehouseId: "22222222-0000-4a00-9b00-222222222222"
                      quantity: 2
                      weightGrams: 3000
                      dimensionsMm: { length: 400, width: 300, height: 200 }
      responses:
        '200':
          description: Варианты доставки рассчитаны (в т.ч. частичная деградация).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculateResponse'
              examples:
                success:
                  summary: Два продавца, доступны оба перевозчика
                  value:
                    requestId: "3a7b1f90-0000-4a00-9b00-c0ffeec0ffee"
                    shipmentGroups:
                      - merchantId: "8f1c2d3e-0000-4a00-9b00-aaaaaaaaaaaa"
                        warehouseId: "11111111-0000-4a00-9b00-111111111111"
                        options:
                          - carrier: "CDEK"
                            method: "PVZ"
                            cost: 199.00
                            currency: "RUB"
                            minDays: 2
                            maxDays: 4
                          - carrier: "BOXBERRY"
                            method: "PVZ"
                            cost: 179.50
                            currency: "RUB"
                            minDays: 3
                            maxDays: 5
                      - merchantId: "9e2d3f4a-0000-4a00-9b00-bbbbbbbbbbbb"
                        warehouseId: "22222222-0000-4a00-9b00-222222222222"
                        options:
                          - carrier: "CDEK"
                            method: "COURIER"
                            cost: 450.00
                            currency: "RUB"
                            minDays: 1
                            maxDays: 2
                    unavailableCarriers: []
                degraded:
                  summary: Boxberry недоступен — graceful degradation
                  value:
                    requestId: "3a7b1f90-0000-4a00-9b00-c0ffeec0ffee"
                    shipmentGroups:
                      - merchantId: "8f1c2d3e-0000-4a00-9b00-aaaaaaaaaaaa"
                        warehouseId: "11111111-0000-4a00-9b00-111111111111"
                        options:
                          - carrier: "CDEK"
                            method: "PVZ"
                            cost: 199.00
                            currency: "RUB"
                            minDays: 2
                            maxDays: 4
                    unavailableCarriers:
                      - carrier: "BOXBERRY"
                        reason: "temporarily_unavailable"
        '400':
          description: Некорректный синтаксис запроса (битый JSON, нет обязательных полей).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "BAD_REQUEST"
                message: "Field 'destination.postalCode' is required"
                requestId: "3a7b1f90-0000-4a00-9b00-c0ffeec0ffee"
        '422':
          description: Синтаксис верный, но бизнес-валидация не пройдена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidDimensions:
                  value:
                    code: "INVALID_DIMENSIONS"
                    message: "Item 'SKU-A-001' has non-positive weight"
                    requestId: "3a7b1f90-0000-4a00-9b00-c0ffeec0ffee"
                noOptions:
                  value:
                    code: "NO_DELIVERY_OPTIONS"
                    message: "No carrier serves postalCode 999999"
                    requestId: "3a7b1f90-0000-4a00-9b00-c0ffeec0ffee"
        '500':
          description: Внутренняя ошибка сервиса.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "INTERNAL_ERROR"
                message: "Unexpected error, see requestId in logs"
                requestId: "3a7b1f90-0000-4a00-9b00-c0ffeec0ffee"
        '503':
          description: Все перевозчики недоступны и кэш пуст.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "ALL_CARRIERS_UNAVAILABLE"
                message: "All carrier integrations are currently unavailable"
                requestId: "3a7b1f90-0000-4a00-9b00-c0ffeec0ffee"

components:
  schemas:
    CalculateRequest:
      type: object
      required: [destination, items]
      properties:
        destination:
          $ref: '#/components/schemas/Destination'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CartItem'

    Destination:
      type: object
      required: [city, postalCode]
      properties:
        city:
          type: string
          example: "Казань"
        postalCode:
          type: string
          pattern: '^[0-9]{6}$'
          example: "420012"
        address:
          type: string
          example: "ул. Баумана, д. 1"

    CartItem:
      type: object
      required: [sku, merchantId, warehouseId, quantity, weightGrams]
      properties:
        sku:
          type: string
          example: "SKU-A-001"
        merchantId:
          type: string
          format: uuid
        warehouseId:
          type: string
          format: uuid
        quantity:
          type: integer
          format: int32
          minimum: 1
          example: 1
        weightGrams:
          type: integer
          format: int32
          minimum: 1
          example: 1200
        dimensionsMm:
          $ref: '#/components/schemas/Dimensions'

    Dimensions:
      type: object
      required: [length, width, height]
      properties:
        length: { type: integer, format: int32, minimum: 1, example: 200 }
        width:  { type: integer, format: int32, minimum: 1, example: 150 }
        height: { type: integer, format: int32, minimum: 1, example: 80 }

    CalculateResponse:
      type: object
      required: [requestId, shipmentGroups, unavailableCarriers]
      properties:
        requestId:
          type: string
          format: uuid
        shipmentGroups:
          type: array
          items:
            $ref: '#/components/schemas/ShipmentGroup'
        unavailableCarriers:
          type: array
          items:
            $ref: '#/components/schemas/UnavailableCarrier'

    ShipmentGroup:
      type: object
      required: [merchantId, warehouseId, options]
      properties:
        merchantId:
          type: string
          format: uuid
        warehouseId:
          type: string
          format: uuid
        options:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryOption'

    DeliveryOption:
      type: object
      required: [carrier, method, cost, currency, minDays, maxDays]
      properties:
        carrier:
          type: string
          enum: [CDEK, BOXBERRY]
        method:
          type: string
          enum: [PVZ, COURIER, POSTAMAT]
        cost:
          type: number
          format: double
          example: 199.00
        currency:
          type: string
          example: "RUB"
        minDays:
          type: integer
          format: int32
          example: 2
        maxDays:
          type: integer
          format: int32
          example: 4

    UnavailableCarrier:
      type: object
      required: [carrier, reason]
      properties:
        carrier:
          type: string
          enum: [CDEK, BOXBERRY]
        reason:
          type: string
          enum: [temporarily_unavailable, not_serviced]

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "BAD_REQUEST"
        message:
          type: string
        requestId:
          type: string
          format: uuid
