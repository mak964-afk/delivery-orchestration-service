name: Render PlantUML Diagrams

# Docs-as-Code в действии: при каждом изменении любого .puml-файла этот
# workflow автоматически перерисовывает диаграммы в SVG и PNG и коммитит
# результат обратно в репозиторий. Аналитику/архитектору не нужно вручную
# экспортировать картинки — документация и схемы всегда синхронны с кодом.

on:
  push:
    paths:
      - 'diagrams/**/*.puml'
  workflow_dispatch:   # позволяет запустить рендер вручную из вкладки Actions

permissions:
  contents: write      # нужно, чтобы закоммитить отрисованные картинки обратно

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      # Разрешаем PlantUML подтягивать библиотеку C4-PlantUML по !include https://...
      PLANTUML_SECURITY_PROFILE: INTERNET
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PlantUML + Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz

      - name: Render .puml -> SVG and PNG
        run: |
          mkdir -p diagrams/rendered
          plantuml -tsvg -o rendered diagrams/*.puml
          plantuml -tpng -o rendered diagrams/*.puml
          echo "Сгенерированные файлы:"; ls -1 diagrams/rendered

      - name: Commit rendered images back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): auto-render PlantUML diagrams [skip ci]"
          file_pattern: 'diagrams/rendered/*'
